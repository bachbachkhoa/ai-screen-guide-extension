<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Screen Guide</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0d0f14;
      --surface: #161920;
      --border: #2a2d38;
      --accent: #ff4757;
      --accent2: #ffa502;
      --green: #2ed573;
      --text: #e8eaf0;
      --muted: #6b7080;
      --radius: 8px;
    }

    body {
      width: 340px;
      min-height: 420px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      padding: 0;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .logo {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      box-shadow: 0 0 12px rgba(255, 71, 87, 0.4);
    }

    .title {
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.02em;
    }
    .subtitle {
      font-size: 10px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 1px;
    }

    .status-dot {
      margin-left: auto;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: all 0.3s;
    }
    .status-dot.active { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .status-dot.loading { background: var(--accent2); animation: pulse 1s infinite; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }

    .section-label {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .provider-tabs {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 3px;
    }

    .tab {
      flex: 1;
      padding: 5px 8px;
      border: none;
      border-radius: 5px;
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .tab.active {
      background: var(--accent);
      color: white;
      font-weight: 600;
    }
    .tab:hover:not(.active) { color: var(--text); background: var(--border); }

    .input-wrap {
      position: relative;
      margin-top: 4px;
    }

    input[type="password"], input[type="text"], textarea, select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }

    .eye-btn {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      padding: 2px;
    }

    select option { background: var(--surface); }

    textarea {
      resize: none;
      height: 72px;
      line-height: 1.5;
      font-size: 12px;
      font-family: 'Space Grotesk', sans-serif;
    }

    .quick-prompts {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .qp {
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: transparent;
      color: var(--muted);
      font-size: 10px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .qp:hover { border-color: var(--accent); color: var(--accent); }

    .scan-btn {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: white;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      letter-spacing: 0.02em;
      box-shadow: 0 4px 16px rgba(255, 71, 87, 0.25);
    }
    .scan-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,71,87,0.4); }
    .scan-btn:active { transform: translateY(0); }
    .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .result-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px;
      font-size: 12px;
      line-height: 1.6;
      max-height: 120px;
      overflow-y: auto;
      white-space: pre-wrap;
      display: none;
      color: var(--text);
    }
    .result-box.show { display: block; }
    .result-box.error { border-color: var(--accent); color: #ff6b7a; }

    .result-box::-webkit-scrollbar { width: 3px; }
    .result-box::-webkit-scrollbar-track { background: transparent; }
    .result-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .actions {
      display: flex;
      gap: 6px;
    }
    .clear-btn {
      flex: 1;
      padding: 7px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Space Grotesk', sans-serif;
    }
    .clear-btn:hover { border-color: var(--muted); color: var(--text); }

    .divider { height: 1px; background: var(--border); }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">👁</div>
  <div>
    <div class="title">AI Screen Guide</div>
    <div class="subtitle">scan → AI → highlight</div>
  </div>
  <div class="status-dot" id="statusDot"></div>
</div>

<div class="body">

  <div id="guidedFlowPanel" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
      <div class="section-label" id="stepProgress" style="margin-bottom:0"></div>
      <button class="clear-btn" id="cancelFlowBtn" style="flex:0;padding:4px 10px;font-size:10px">Hủy flow</button>
    </div>
    <div id="stepDesc" style="font-size:12px;color:var(--text);line-height:1.5;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px"></div>
    <div id="rescanWarning" style="display:none;margin-top:8px;padding:6px 8px;background:rgba(255,165,2,0.08);border:1px solid var(--accent2);border-radius:6px;align-items:center;gap:8px">
      <span style="flex:1;font-size:11px;color:var(--accent2)">⚠️ Không tìm được nút. Re-scan sẽ tốn 1 API call.</span>
      <button class="clear-btn" id="rescanBtn" style="flex:0;padding:3px 10px;font-size:10px;border-color:var(--accent2);color:var(--accent2);white-space:nowrap">Re-scan</button>
    </div>
  </div>

  <div class="divider" id="guidedDivider" style="display:none"></div>

  <div id="scanSection">
  <div>
    <div class="section-label">AI Provider</div>
    <div class="provider-tabs">
      <button class="tab active" data-provider="openai">OpenAI</button>
      <button class="tab" data-provider="deepseek">DeepSeek</button>
      <button class="tab" data-provider="claude">Claude</button>
      <button class="tab" data-provider="qwen">Qwen</button>
    </div>
  </div>

  <div>
    <div class="section-label">API Key</div>
    <div class="input-wrap">
      <input type="password" id="apiKey" placeholder="sk-...  (lưu local, không gửi đi đâu)" />
      <button class="eye-btn" id="toggleKey">👁</button>
    </div>
  </div>

  <div>
    <div class="section-label">Model</div>
    <select id="modelSelect">
      <option value="gpt-4o">gpt-4o</option>
      <option value="gpt-4o-mini">gpt-4o-mini (rẻ hơn)</option>
    </select>
  </div>

  <div class="divider"></div>

  <div>
    <div class="section-label">Câu hỏi / Task</div>
    <textarea id="prompt" placeholder="Tôi muốn tạo một VM mới trên Google Cloud. Tôi nên bấm vào đâu?"></textarea>
    <div class="quick-prompts" style="margin-top:6px">
      <button class="qp" data-q="Bước tiếp theo tôi cần làm gì trên trang này?">❓ Bước tiếp theo</button>
    </div>
  </div>

  <div class="actions">
    <button class="scan-btn" id="scanBtn" style="flex:3">
      <span id="btnIcon">📸</span>
      <span id="btnText">Scan & Phân tích</span>
    </button>
    <button class="clear-btn" id="clearBtn">Xóa highlight</button>
  </div>
  <div id="screenshotNote" style="font-size:10px;color:var(--muted);text-align:center;display:none">
    ⚠️ Screenshot sẽ được gửi lên AI provider. Đảm bảo không có thông tin nhạy cảm trên màn hình.
  </div>

  </div>

  <div class="result-box" id="resultBox"></div>

</div>

<script src="popup.js"></script>
</body>
</html>
