<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chính sách quyền riêng tư — AI Screen Guide</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.7;
      background: #0d0f14;
      color: #e8eaf0;
      padding: 40px 20px;
    }
    .container { max-width: 680px; margin: 0 auto; }
    .meta { font-size: 12px; color: #6b7080; margin-bottom: 32px; }
    h2 { font-size: 15px; font-weight: 600; color: #e8eaf0; margin: 28px 0 10px; border-left: 3px solid #ff4757; padding-left: 10px; }
    p { color: #b0b4c0; margin-bottom: 10px; }
    ul { color: #b0b4c0; padding-left: 20px; margin-bottom: 10px; }
    li { margin-bottom: 6px; }
    .highlight { background: #161920; border: 1px solid #2a2d38; border-radius: 8px; padding: 14px 16px; margin: 16px 0; }
    .highlight p { margin: 0; color: #e8eaf0; }
    code { font-family: 'JetBrains Mono', monospace; background: #1e2130; padding: 2px 6px; border-radius: 4px; font-size: 12px; color: #ffa502; }
    a { color: #ff4757; }
    .provider-list { display: flex; flex-direction: column; gap: 8px; margin: 10px 0; }
    .provider { background: #161920; border: 1px solid #2a2d38; border-radius: 6px; padding: 10px 14px; }
    .provider strong { color: #e8eaf0; }
    .provider span { color: #6b7080; font-size: 12px; font-family: monospace; }
    .page-header {
      max-width: 680px; margin: 0 auto 6px;
      display: flex; justify-content: space-between; align-items: center;
    }
    h1 { font-size: 22px; font-weight: 700; color: #ff4757; margin: 0; }
    .lang-switcher { display: flex; gap: 6px; }
    .lang-btn {
      font-size: 11px; color: #6b7080; background: #161920;
      border: 1px solid #2a2d38; cursor: pointer;
      font-family: 'JetBrains Mono', monospace; padding: 4px 10px;
      border-radius: 4px; transition: all 0.2s;
    }
    .lang-btn:hover, .lang-btn.active { color: #ff4757; border-color: #ff4757; }
  </style>
</head>
<body>

<div class="page-header">
  <h1 id="privacyTitle"></h1>
  <div class="lang-switcher">
    <button class="lang-btn" data-lang="vi">VI</button>
    <button class="lang-btn" data-lang="en">EN</button>
  </div>
</div>
<div class="container" id="privacyContent"></div>

<script src="privacy.js"></script>
</body>
</html>
